name: Renew Bob Buzzard Demo Dev Org Lease
run-name: ${{ github.actor }} triggered dev org renewal build
#on: [push]
on:
  schedule:
    - cron:  '30 20 * * MON'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  dev-org-renew:
    runs-on: ubuntu-latest
    environment: renew-bob-buzzard-demo
    steps:
      - uses: actions/checkout@v4
        with: 
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 'Install CLI'
        run: npm install @salesforce/cli --location=global
      - run: sf --version
      - name: 'Authenticate to Agentforce org'
        run: |
            echo ${{ secrets.BOB_BUZZARD_DEMO_URL }} > ./BOB_BUZZARD_DEMO_URL.txt
            ls -al ./BOB_BUZZARD_DEMO_URL.txt
            sf org login sfdx-url -f ./BOB_BUZZARD_DEMO_URL.txt -a renew-bob-buzzard-demo -d
      - name: 'Query data'
        run: |
            sf data query --query "select name from organization" -o renew-bob-buzzard-demo
